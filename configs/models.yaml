# Per-agent model registry consumed by the Vertex wrapper.
#
# Models per ADR-003 (Gemini 2.5 Flash for interviewer/assessor, Gemini 2.5
# Pro for planner). Per Clarifications 2026-04-26 (Q5) T04 ships this file
# with `prompt_version: "v0001"` as a placeholder; T17 swaps the placeholder
# for the real prompt content under `prompts/<agent>/v0001/`.
#
# Constitution §16 (configs as code). All caps from §12 enforced at load
# time by app/backend/llm/models_config.py.

interviewer:
  model: gemini-2.5-flash
  prompt_version: "v0001"
  temperature: 0.4
  max_output_tokens: 2048

assessor:
  model: gemini-2.5-flash
  prompt_version: "v0001"
  temperature: 0.1
  max_output_tokens: 2048

planner:
  model: gemini-2.5-pro
  prompt_version: "v0001"
  temperature: 0.3
  max_output_tokens: 4096
