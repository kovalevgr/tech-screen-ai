# TechScreen — CI / integration-test stack.
#
# Same image shape as dev (Dockerfile `dev` target — pytest, ruff, mypy
# bundled). Postgres + vertex-mock are profile-gated so today's T02 test
# run can do `docker compose -f docker-compose.test.yml run --rm backend
# pytest app/backend/tests` with no DB. T05 lights up the `db` profile
# and reactivates the `alembic upgrade head` step in the default command.
#
# Profiles:
#   (default)        — `backend` only.
#   --profile db     — adds Postgres (T05+).
#   --profile llm    — adds Vertex mock (T04+).
#   --profile e2e    — adds frontend + Playwright runner (post-T03).
#
# Invoked by CI (T10): `docker compose -f docker-compose.test.yml run --rm --build backend pytest app/backend/tests`.

name: techscreen-test

services:
  postgres:
    profiles: ["db", "full"]
    image: postgres:16-bookworm
    environment:
      POSTGRES_USER: techscreen
      POSTGRES_PASSWORD: techscreen
      POSTGRES_DB: techscreen_test
    # tmpfs for speed; no volume — data dies with the container.
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techscreen -d techscreen_test"]
      interval: 2s
      timeout: 2s
      retries: 15

  vertex-mock:
    profiles: ["llm", "full"]
    build:
      context: .
      dockerfile: Dockerfile.vertex-mock
    environment:
      MOCK_PORT: "8080"
      LOG_FORMAT: json
      LOG_LEVEL: warning
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 2s
      timeout: 2s
      retries: 15

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    environment:
      APP_ENV: test
      LLM_BACKEND: mock
      LOG_FORMAT: json
      LOG_LEVEL: info
      # Used only when their profile is active:
      DATABASE_URL: postgresql+asyncpg://techscreen:techscreen@postgres:5432/techscreen_test
      VERTEX_MOCK_URL: http://vertex-mock:8080
      MAGIC_LINK_SIGNING_KEY: test-signing-key-not-a-real-secret
      SESSION_COOKIE_SECRET: test-cookie-secret-not-a-real-secret
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      vertex-mock:
        condition: service_healthy
        required: false
    # T02: tests do not need a DB; alembic step lands with T05 (it would
    # fail today because `alembic/` only carries a placeholder). Override
    # the command from CLI when needed: `docker compose -f
    # docker-compose.test.yml run --rm backend pytest -k smoke`.
    command:
      - sh
      - -c
      - |
        set -eu
        # TODO(T05): re-enable once Alembic migrations land.
        # alembic upgrade head
        pytest --maxfail=1 --strict-markers -ra app/backend/tests

  frontend:
    profiles: ["e2e", "full"]
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: runtime
      args:
        NEXT_PUBLIC_API_BASE_URL: http://backend:8000
        NEXT_PUBLIC_APP_ENV: test
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_APP_ENV: test
    depends_on:
      - backend

  e2e:
    profiles: ["e2e"]
    image: mcr.microsoft.com/playwright:v1.48.0-jammy
    working_dir: /repo
    environment:
      PLAYWRIGHT_BASE_URL: http://frontend:3000
      CI: "1"
    volumes:
      - ./:/repo
    depends_on:
      - frontend
    command:
      - sh
      - -c
      - |
        set -eu
        cd /repo/app/frontend
        pnpm install --frozen-lockfile
        pnpm exec playwright install --with-deps chromium
        pnpm e2e
