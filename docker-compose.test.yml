# TechScreen — CI / integration-test stack.
#
# Same image shape as dev (Dockerfile `dev` target — pytest, ruff, mypy
# bundled). Postgres is profile-gated.
#
# Profiles:
#   (default)        — `backend` + `frontend`. No-DB pytest + pnpm test.
#   --profile db     — adds Postgres. Default command applies `alembic
#                      upgrade head` and runs the full backend suite.
#   --profile e2e    — adds the Playwright runner (post-T03).
#
# Invoked by CI (T10): `docker compose -f docker-compose.test.yml run --rm --build backend pytest app/backend/tests`.
#
# T09 (2026-04-28) removed the HTTP `vertex-mock` service. The Vertex
# mock is the in-process fixture-keyed stub at
# `app/backend/llm/_mock_backend.py` (T04). See
# `docs/engineering/docker.md` for the full Docker contract.

name: techscreen-test

services:
  postgres:
    profiles: ["db"]
    # pgvector/pgvector:pg17 (== docker-compose.yml dev image): constitution §7
    # Docker parity, and required so `CREATE EXTENSION vector` in the baseline
    # migration succeeds in CI (stock postgres images lack the extension files).
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: techscreen
      POSTGRES_PASSWORD: techscreen
      POSTGRES_DB: techscreen_test
    # tmpfs for speed; no volume — data dies with the container.
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techscreen -d techscreen_test"]
      interval: 2s
      timeout: 2s
      retries: 15

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    environment:
      APP_ENV: test
      LLM_BACKEND: mock
      LOG_FORMAT: json
      LOG_LEVEL: info
      # Used only when the `db` profile is active:
      DATABASE_URL: postgresql+asyncpg://techscreen:techscreen@postgres:5432/techscreen_test
      MAGIC_LINK_SIGNING_KEY: test-signing-key-not-a-real-secret
      SESSION_COOKIE_SECRET: test-cookie-secret-not-a-real-secret
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    # The default command applies the migration (db profile) then runs the
    # full suite. Without the `db` profile the postgres service is absent, so
    # `alembic upgrade head` would have no DB — run the no-DB unit suite via
    # the explicit CLI override instead: `docker compose -f
    # docker-compose.test.yml run --rm backend pytest app/backend/tests`
    # (the DB tests skip themselves when DATABASE_URL is unreachable).
    command:
      - sh
      - -c
      - |
        set -eu
        alembic upgrade head
        pytest --maxfail=1 --strict-markers -ra app/backend/tests

  frontend:
    # No profile — the canonical T03 commands invoke this service
    # directly via `docker compose -f docker-compose.test.yml run --rm
    # frontend <cmd>` (e.g., `pnpm test`, `pnpm tokens:check`,
    # `pnpm exec eslint . && tsc --noEmit`). Mirrors the `backend`
    # block convention (no profile, `dev` target).
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: dev
      args:
        NEXT_PUBLIC_API_BASE_URL: http://backend:8000
        NEXT_PUBLIC_APP_ENV: test
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_APP_ENV: test
      CI: "1"
    working_dir: /app/frontend
    volumes:
      # Source bind-mount at /app/frontend — matches the dev-image
      # WORKDIR. Gives `pnpm test`, `pnpm tokens:check`, etc. live
      # access to source edits. The dev image's
      # /app/frontend/node_modules is preserved by the anonymous-volume
      # carve-out below.
      - ./app/frontend:/app/frontend
      - /app/frontend/node_modules
      # The token generator computes REPO_ROOT by walking three levels
      # up from `app/frontend/scripts/generate-tokens.ts`. Inside the
      # container that lands at `/`, so the markdown source must live
      # at /docs/design/tokens. Read-only — tokens are source-of-truth
      # and tests must not mutate them.
      - ./docs:/docs:ro
    # No long-running command. Services here run on-demand via
    # `run --rm frontend <cmd>`. Matches the backend block's pattern
    # of staying idle until the runner activates it.
    command: ["tail", "-f", "/dev/null"]

  e2e:
    profiles: ["e2e"]
    image: mcr.microsoft.com/playwright:v1.48.0-jammy
    working_dir: /repo
    environment:
      PLAYWRIGHT_BASE_URL: http://frontend:3000
      CI: "1"
    volumes:
      - ./:/repo
    depends_on:
      - frontend
    command:
      - sh
      - -c
      - |
        set -eu
        cd /repo/app/frontend
        pnpm install --frozen-lockfile
        pnpm exec playwright install --with-deps chromium
        pnpm e2e
