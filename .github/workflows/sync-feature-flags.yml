# T05a — feature-flag sync workflow. LIVE SINCE T06.
#
# Authenticates to Cloud SQL via Workload Identity Federation (NO JSON
# service-account key; constitution §6) and upserts every entry from
# configs/feature-flags.yaml into the feature_flag table with
# updated_by='configs-as-code'. Orphan rows (in DB but not in YAML) are
# surfaced as workflow warning annotations — NEVER auto-deleted (FR-009).
#
# T06 filled the former <TODO-T06> placeholders and matrixed the job over
# both environments (ADR-023: dev + prod). One environment failing does not
# mask the other (fail-fast: false). The Guard step from the inert era is
# kept as defence in depth — it now evaluates skip=false.
#
# DB identity: techscreen-flag-sync@ authenticates as itself via the Auth
# Proxy's --auto-iam-authn (Postgres username = SA email minus
# .gserviceaccount.com). Its in-database privileges are limited to the
# feature_flag table — applied post-migration via scripts/cloud-db-grants.sql.

name: Sync feature flags

on:
  push:
    branches: [main]
    paths:
      - "configs/feature-flags.yaml"
      - "docs/contracts/feature-flag.schema.json"
      - ".github/workflows/sync-feature-flags.yml"
  workflow_dispatch: {}

permissions:
  id-token: write # required by google-github-actions/auth (WIF)
  contents: read

jobs:
  sync:
    name: Upsert flags into Cloud SQL (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [dev, prod]
        include:
          - env: dev
            cloud_sql_instance: "tech-screen-493720:europe-west1:techscreen-pg-dev"
          - env: prod
            cloud_sql_instance: "tech-screen-493720:europe-west1:techscreen-pg"
    env:
      WIF_PROVIDER: "projects/463244185014/locations/global/workloadIdentityPools/github-actions/providers/github"
      WIF_SERVICE_ACCOUNT: "techscreen-flag-sync@tech-screen-493720.iam.gserviceaccount.com"
      GCP_PROJECT: "tech-screen-493720"
      CLOUD_SQL_INSTANCE: ${{ matrix.cloud_sql_instance }}
      DATABASE_NAME: "techscreen"
      # IAM DB user (auto-iam-authn): SA email minus .gserviceaccount.com.
      DATABASE_USER: "techscreen-flag-sync@tech-screen-493720.iam"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation deps
        run: pip install "jsonschema>=4.23,<5" "pyyaml>=6.0,<7" "asyncpg>=0.30,<0.31"

      - name: Validate YAML against committed schema (defence in depth; FR-006)
        run: python scripts/check-feature-flag-registration.py

      - name: Guard — verify WIF / Cloud SQL binding values present
        id: t06_guard
        run: |
          if [ -z "$WIF_PROVIDER" ] || [ -z "$WIF_SERVICE_ACCOUNT" ] || [ -z "$GCP_PROJECT" ] || [ -z "$CLOUD_SQL_INSTANCE" ]; then
            echo "::warning::Binding values missing (should not happen post-T06)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to GCP via Workload Identity Federation
        if: steps.t06_guard.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Start Cloud SQL Auth Proxy (IAM auth, ephemeral)
        if: steps.t06_guard.outputs.skip != 'true'
        run: |
          curl -fsSL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.13.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy --auto-iam-authn --port=5432 "$CLOUD_SQL_INSTANCE" &
          for _ in {1..15}; do
            if (echo > /dev/tcp/127.0.0.1/5432) 2>/dev/null; then break; fi
            sleep 1
          done

      - name: Upsert feature_flag rows + warn on orphans
        if: steps.t06_guard.outputs.skip != 'true'
        env:
          DATABASE_URL: "postgresql://${{ env.DATABASE_USER }}@127.0.0.1:5432/${{ env.DATABASE_NAME }}"
        run: python scripts/sync_feature_flags_to_db.py
