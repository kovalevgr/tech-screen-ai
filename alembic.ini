# Alembic configuration for TechScreen (T05).
#
# The database URL is intentionally NOT hard-coded here: env.py reads it from
# Settings/DATABASE_URL (postgresql+asyncpg://…). This keeps the secret/DSN out
# of source (constitution §5) and lets the same config serve dev, CI, and the
# offline `--sql` dry-run gate (T10).

[alembic]
script_location = alembic
prepend_sys_path = .
# Migration filenames: <ordinal>_<imperative-sentence>.py (coding-conventions).
# %% are escaped for ConfigParser; render as a literal % in the template.
file_template = %%(rev)s_%%(slug)s
timezone =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
