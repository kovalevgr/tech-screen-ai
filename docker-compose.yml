# TechScreen — local dev stack.
#
# Goal: one `docker compose up backend` brings up just the backend with
# hot reload — no postgres, no Vertex mock, no `.env` required. Use
# profiles to opt in to the heavier services as later tasks add them.
#
# Profiles:
#   (default)        — `backend` only (T02 baseline). `docker compose up`.
#   --profile db     — adds Postgres 17 + pgvector (lights up at T05).
#   --profile llm    — adds the Vertex mock (lights up at T04).
#   --profile web    — adds the Next.js frontend (lights up at T03).
#   --profile full   — everything above (Tier-1 gate / T11 smoke).
#
# Constitution §7 Docker parity: backend uses the multi-stage `dev`
# target — same image shape that runs in CI (docker-compose.test.yml).
# Production deploys the `runtime` target (no dev deps); see Dockerfile.

name: techscreen-dev

services:
  postgres:
    profiles: ["db", "full"]
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: techscreen
      POSTGRES_PASSWORD: techscreen
      POSTGRES_DB: techscreen
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techscreen -d techscreen"]
      interval: 5s
      timeout: 3s
      retries: 10

  vertex-mock:
    profiles: ["llm", "full"]
    build:
      context: .
      dockerfile: Dockerfile.vertex-mock
    restart: unless-stopped
    environment:
      MOCK_PORT: "8080"
      LOG_FORMAT: json
      LOG_LEVEL: info
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    # `.env` is intentionally NOT loaded by default at T02 — the
    # backend boots with no required env vars (FR-003). Tasks that
    # introduce real secrets (T04 Vertex, T05/T06 Postgres + Secret
    # Manager) reactivate `env_file: .env` then.
    environment:
      APP_ENV: dev
      LOG_FORMAT: json
      LOG_LEVEL: debug
      # Optional dev knobs (used only when their profile is active):
      DATABASE_URL: postgresql+asyncpg://techscreen:techscreen@postgres:5432/techscreen
      VERTEX_MOCK_URL: http://vertex-mock:8080
    ports:
      - "127.0.0.1:8000:8000"
    # depends_on resolves at the profile level: when the dependent
    # service is hidden behind a profile that's not active, the
    # depends_on entry is silently ignored by Compose.
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      vertex-mock:
        condition: service_healthy
        required: false
    # Bind-mount source for hot reload. Uvicorn reload is enabled via
    # the dev image's default CMD.
    volumes:
      - ./app/backend:/app/app/backend
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./configs:/app/configs
      - ./prompts:/app/prompts

  frontend:
    profiles: ["web", "full"]
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: dev
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        NEXT_PUBLIC_APP_ENV: dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_APP_ENV: dev
    ports:
      - "127.0.0.1:3000:3000"
    # Frontend boots without the backend (FR-003). When `--profile full`
    # brings the backend up, compose will start it first; when only
    # `--profile web` is active, `required: false` lets the frontend
    # come up alone.
    depends_on:
      backend:
        condition: service_started
        required: false
    volumes:
      - ./app/frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    working_dir: /app/frontend
    command: ["pnpm", "dev", "--hostname", "0.0.0.0", "--port", "3000"]

volumes:
  postgres-data:
  frontend-node-modules:
