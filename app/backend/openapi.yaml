components:
  schemas:
    CompetencySelection:
      additionalProperties: false
      description: One selected competency and whether it is mandatory.
      properties:
        competency_id:
          format: uuid
          title: Competency Id
          type: string
        must_have:
          title: Must Have
          type: boolean
      required:
      - competency_id
      - must_have
      title: CompetencySelection
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HealthResponse:
      description: Response body for ``GET /health`` — stable across revisions.
      properties:
        service:
          const: techscreen-backend
          title: Service
          type: string
        status:
          const: ok
          title: Status
          type: string
        version:
          title: Version
          type: string
      required:
      - status
      - service
      - version
      title: HealthResponse
      type: object
    PositionLevel:
      description: Target seniority of a role — distinct from rubric per-competency
        levels.
      enum:
      - Junior
      - Middle
      - Senior
      - Tech Leader
      title: PositionLevel
      type: string
    PositionTemplateCreate:
      additionalProperties: false
      description: Request body for creating a Position Template (the T13 POST shape).
      properties:
        competency_ids:
          items:
            format: uuid
            type: string
          minItems: 1
          title: Competency Ids
          type: array
        jd_text:
          anyOf:
          - type: string
          - type: 'null'
          title: Jd Text
        level:
          $ref: '#/components/schemas/PositionLevel'
        must_have_competency_ids:
          items:
            format: uuid
            type: string
          title: Must Have Competency Ids
          type: array
        stack_ids:
          items:
            format: uuid
            type: string
          minItems: 1
          title: Stack Ids
          type: array
        title:
          maxLength: 200
          minLength: 1
          title: Title
          type: string
      required:
      - title
      - level
      - stack_ids
      - competency_ids
      title: PositionTemplateCreate
      type: object
    PositionTemplateRead:
      additionalProperties: false
      description: Response body for reading a Position Template (the T13 GET shape).
      properties:
        archived_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Archived At
        competencies:
          items:
            $ref: '#/components/schemas/CompetencySelection'
          title: Competencies
          type: array
        created_at:
          format: date-time
          title: Created At
          type: string
        created_by:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Created By
        id:
          format: uuid
          title: Id
          type: string
        jd_text:
          anyOf:
          - type: string
          - type: 'null'
          title: Jd Text
        level:
          $ref: '#/components/schemas/PositionLevel'
        stack_ids:
          items:
            format: uuid
            type: string
          title: Stack Ids
          type: array
        title:
          title: Title
          type: string
      required:
      - id
      - title
      - level
      - jd_text
      - archived_at
      - created_at
      - created_by
      - stack_ids
      - competencies
      title: PositionTemplateRead
      type: object
    PositionTemplateUpdate:
      additionalProperties: false
      description: 'Partial-update body for a Position Template (the T13 PATCH shape).


        All fields optional; only fields present in the request are applied (the

        service inspects ``model_fields_set``). Provided selection lists replace the

        set wholesale. The must-have ⊆ selected rule is checked here when both lists

        are present; the must-have-without-competency_ids case is rejected at the

        service layer (it needs the existing selected set to validate against).'
      properties:
        competency_ids:
          anyOf:
          - items:
              format: uuid
              type: string
            minItems: 1
            type: array
          - type: 'null'
          title: Competency Ids
        jd_text:
          anyOf:
          - type: string
          - type: 'null'
          title: Jd Text
        level:
          anyOf:
          - $ref: '#/components/schemas/PositionLevel'
          - type: 'null'
        must_have_competency_ids:
          anyOf:
          - items:
              format: uuid
              type: string
            type: array
          - type: 'null'
          title: Must Have Competency Ids
        stack_ids:
          anyOf:
          - items:
              format: uuid
              type: string
            minItems: 1
            type: array
          - type: 'null'
          title: Stack Ids
        title:
          anyOf:
          - maxLength: 200
            minLength: 1
            type: string
          - type: 'null'
          title: Title
      title: PositionTemplateUpdate
      type: object
    RubricSnapshot:
      additionalProperties: false
      description: The whole frozen tree for one rubric version.
      properties:
        label:
          title: Label
          type: string
        rubric_tree_version_id:
          format: uuid
          title: Rubric Tree Version Id
          type: string
        stacks:
          items:
            $ref: '#/components/schemas/SnapshotStack'
          title: Stacks
          type: array
      required:
      - rubric_tree_version_id
      - label
      - stacks
      title: RubricSnapshot
      type: object
    SnapshotCompetency:
      additionalProperties: false
      properties:
        id:
          format: uuid
          title: Id
          type: string
        levels:
          items:
            $ref: '#/components/schemas/SnapshotLevel'
          title: Levels
          type: array
        name:
          title: Name
          type: string
        topics:
          items:
            $ref: '#/components/schemas/SnapshotTopic'
          title: Topics
          type: array
      required:
      - id
      - name
      - topics
      - levels
      title: SnapshotCompetency
      type: object
    SnapshotCompetencyBlock:
      additionalProperties: false
      properties:
        competencies:
          items:
            $ref: '#/components/schemas/SnapshotCompetency'
          title: Competencies
          type: array
        id:
          format: uuid
          title: Id
          type: string
        name:
          title: Name
          type: string
        position:
          title: Position
          type: integer
      required:
      - id
      - name
      - position
      - competencies
      title: SnapshotCompetencyBlock
      type: object
    SnapshotLevel:
      additionalProperties: false
      properties:
        descriptor:
          title: Descriptor
          type: string
        id:
          format: uuid
          title: Id
          type: string
        rank:
          title: Rank
          type: integer
      required:
      - id
      - rank
      - descriptor
      title: SnapshotLevel
      type: object
    SnapshotStack:
      additionalProperties: false
      properties:
        competency_blocks:
          items:
            $ref: '#/components/schemas/SnapshotCompetencyBlock'
          title: Competency Blocks
          type: array
        id:
          format: uuid
          title: Id
          type: string
        name:
          title: Name
          type: string
      required:
      - id
      - name
      - competency_blocks
      title: SnapshotStack
      type: object
    SnapshotTopic:
      additionalProperties: false
      properties:
        id:
          format: uuid
          title: Id
          type: string
        name:
          title: Name
          type: string
      required:
      - id
      - name
      title: SnapshotTopic
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
  securitySchemes:
    IdentityPlatformBearer:
      bearerFormat: JWT
      description: 'Identity Platform ID token for staff SSO; verified claims contract:
        docs/contracts/id-token-claims.json (T07, ADR-024).'
      scheme: bearer
      type: http
info:
  title: TechScreen Backend
  version: 0.0.0
openapi: 3.1.0
paths:
  /health:
    get:
      description: 'Liveness probe.


        Unauthenticated and dependency-free. Cloud Run readiness probes hit

        this endpoint anonymously; dependency-aware readiness belongs to a

        future ``/ready`` added by the first task that introduces a

        dependency (T04 Vertex, T05 Postgres).'
      operationId: health_health_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: Successful Response
      summary: Health
  /position-templates:
    get:
      operationId: list_position_templates_position_templates_get
      parameters:
      - in: query
        name: include_archived
        required: false
        schema:
          default: false
          title: Include Archived
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/PositionTemplateRead'
                title: Response List Position Templates Position Templates Get
                type: array
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - IdentityPlatformBearer: []
      summary: List Position Templates
      tags:
      - position-templates
    post:
      operationId: create_position_template_position_templates_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PositionTemplateCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PositionTemplateRead'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - IdentityPlatformBearer: []
      summary: Create Position Template
      tags:
      - position-templates
  /position-templates/{template_id}:
    delete:
      operationId: archive_position_template_position_templates__template_id__delete
      parameters:
      - in: path
        name: template_id
        required: true
        schema:
          format: uuid
          title: Template Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PositionTemplateRead'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - IdentityPlatformBearer: []
      summary: Archive Position Template
      tags:
      - position-templates
    get:
      operationId: get_position_template_position_templates__template_id__get
      parameters:
      - in: path
        name: template_id
        required: true
        schema:
          format: uuid
          title: Template Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PositionTemplateRead'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - IdentityPlatformBearer: []
      summary: Get Position Template
      tags:
      - position-templates
    patch:
      operationId: update_position_template_position_templates__template_id__patch
      parameters:
      - in: path
        name: template_id
        required: true
        schema:
          format: uuid
          title: Template Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PositionTemplateUpdate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PositionTemplateRead'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - IdentityPlatformBearer: []
      summary: Update Position Template
      tags:
      - position-templates
  /rubric/active:
    get:
      operationId: read_active_rubric_rubric_active_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RubricSnapshot'
          description: Successful Response
      security:
      - IdentityPlatformBearer: []
      summary: Read Active Rubric
      tags:
      - rubric
